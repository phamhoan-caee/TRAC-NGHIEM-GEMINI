<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SÁT HẠCH LÝ THUYẾT MÁY NÂNG HÀNG - CAEE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');
        body { font-family: 'Roboto', sans-serif; background-color: #f0f2f5; -webkit-tap-highlight-color: transparent; }
        #mainScrollArea::-webkit-scrollbar { width: 4px; }
        #mainScrollArea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @media (max-width: 768px) {
            #quiz-screen { flex-direction: column; overflow-y: auto; }
            aside { width: 100% !important; border-left: none; border-top: 1px solid #e2e8f0; }
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="start-screen" class="fixed inset-0 z-[100] bg-blue-900 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full overflow-hidden flex flex-col md:flex-row">
            <div class="md:w-1/3 bg-blue-700 p-6 text-white flex flex-col justify-center items-center text-center">
                <i class="fas fa-id-card text-5xl mb-4"></i>
                <h2 class="text-xl font-bold uppercase">Học viên</h2>
            </div>
            <div class="md:w-2/3 p-6">
                <div class="mb-6">
                    <h3 class="text-xl font-bold text-gray-800 mb-1">TRƯỜNG CĐ CƠ ĐIỆN NÔNG NGHIỆP VÀ MÔI TRƯỜNG</h3>
                    <p class="text-blue-600 font-bold text-xs uppercase">KHOA MÁY THI CÔNG</p>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">HỌ VÀ TÊN:</label>
                        <input type="text" id="studentName" placeholder="Nguyễn Văn A" class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 focus:outline-none transition text-lg">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">KHÓA HỌC:</label>
                        <input type="text" id="studentID" placeholder="Ví dụ: 4.2026" class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 focus:outline-none transition text-lg">
                    </div>
                    <button onclick="startQuiz()" class="w-full py-4 bg-orange-500 hover:bg-orange-600 text-white font-black rounded-xl shadow-lg transition active:scale-95 uppercase tracking-widest">
                        BẮT ĐẦU THI <i class="fas fa-play ml-2"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <header id="quiz-header" class="hidden bg-blue-800 text-white p-3 shadow-md flex justify-between items-center z-50">
        <div class="flex items-center space-x-2">
            <i class="fas fa-truck-moving text-xl text-orange-400"></i>
            <h1 class="text-sm md:text-xl font-bold uppercase">SÁT HẠCH LÝ THUYẾT MÁY NÂNG HÀNG</h1>
        </div>
        <div id="timer" class="bg-red-600 px-3 py-1 rounded-lg text-lg font-mono font-bold">20:00</div>
    </header>

    <main id="quiz-screen" class="hidden flex-1 flex overflow-hidden">
        <section id="mainScrollArea" class="flex-1 p-3 md:p-6 overflow-y-auto bg-gray-100">
            <div id="quiz-content" class="max-w-4xl mx-auto">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
