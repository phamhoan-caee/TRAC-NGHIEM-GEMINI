<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sát hạch lý thuyết xe nâng</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:Arial;
background:#f3f4f6;
}

.option{
border:2px solid #e5e7eb;
padding:14px;
border-radius:10px;
cursor:pointer;
}

.option.selected{
border-color:#2563eb;
background:#dbeafe;
}

.grid-item{
padding:8px;
text-align:center;
border-radius:6px;
background:white;
cursor:pointer;
}

.grid-item.active{
background:#fde68a;
}

.grid-item.answered{
background:#10b981;
color:white;
}

</style>
</head>

<body class="h-screen flex flex-col">

<!-- LOGIN -->

<div id="login" class="flex flex-col items-center justify-center h-screen">

<h1 class="text-2xl font-bold mb-6">SÁT HẠCH LÝ THUYẾT XE NÂNG</h1>

<input id="inputName" placeholder="Họ và tên"
class="border p-3 mb-3 w-64">

<input id="inputClass" placeholder="Khóa học"
class="border p-3 mb-3 w-64">

<button onclick="startExam()"
class="bg-blue-600 text-white px-6 py-3 rounded">
BẮT ĐẦU THI
</button>

</div>


<!-- HEADER -->

<header id="header"
class="hidden bg-blue-700 text-white p-4 flex justify-between">

<div>

<span class="font-bold">Học viên:</span>
<span id="studentName"></span>

</div>

<div id="timer" class="font-bold text-xl">
20:00
</div>

</header>


<!-- MAIN -->

<div id="main" class="hidden flex flex-1">

<div class="flex-1 p-6">

<h2 id="questionText" class="text-xl font-bold mb-6"></h2>

<div id="options" class="space-y-3"></div>

<div class="flex justify-between mt-8">

<button onclick="prevQuestion()" class="border px-6 py-2">
Trước
</button>

<button onclick="nextQuestion()" class="bg-blue-600 text-white px-6 py-2">
Tiếp
</button>

</div>

</div>

<!-- GRID -->

<div class="w-64 bg-white p-4 border-l">

<div id="grid" class="grid grid-cols-5 gap-2"></div>

<button onclick="submitExam()"
class="mt-6 bg-red-600 text-white w-full py-3">
Nộp bài
</button>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
