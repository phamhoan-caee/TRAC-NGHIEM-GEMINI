<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sát hạch Xe nâng - Khoa Máy thi công CAEE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap');
        body { font-family: 'Lexend', sans-serif; background-color: #f8fafc; }
        .caee-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        .q-grid-item.active { border: 3px solid #f97316; background-color: #fff7ed; transform: scale(1.05); z-index: 10; }
        .q-grid-item.answered { background-color: #10b981; color: white; border-color: #059669; }
        .option-card { transition: all 0.2s; border: 2px solid #e2e8f0; }
        .option-card:hover { border-color: #3b82f6; background-color: #eff6ff; }
        .option-card.selected { border-color: #1e40af; background-color: #dbeafe; }
        .pulse-ai { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        /* Tối ưu cuộn mượt trên mobile */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-x-hidden">

    <div id="loginScreen" class="fixed inset-0 z-[150] bg-slate-100 flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white rounded-3xl shadow-2xl max-w-2xl w-[95%] overflow-hidden flex flex-col md:flex-row my-auto">
            <div class="md:w-2/5 caee-gradient p-8 text-white flex flex-col justify-center items-center text-center">
                <div class="w-16 h-16 md:w-24 md:h-24 bg-white rounded-full flex items-center justify-center mb-4 shadow-lg">
                    <i class="fas fa-truck-pickup text-blue-800 text-2xl md:text-4xl"></i>
                </div>
                <h2 class="text-lg md:text-xl font-extrabold uppercase leading-tight">TRƯỜNG CĐ CƠ ĐIỆN NÔNG NGHIỆP VÀ MÔI TRƯỜNG</h2>
                <p class="text-[12px] mt-2 tracking-widest uppercase opacity-80 font-bold">KHOA MÁY THI CÔNG</p>
            </div>
            <div class="md:w-3/5 p-6 md:p-10">
                <h3 class="text-xl font-black text-slate-600 mb-6 italic text-center md:text-left uppercase">SÁT HẠCH MÁY NÂNG HÀNG</h3>
                <div class="space-y-4">
                    <input type="text" id="inputName" placeholder="Họ và Tên học viên..." class="w-full px-5 py-3 md:py-4 border-2 border-slate-100 rounded-2xl focus:border-blue-600 outline-none font-semibold transition-all text-sm">
                    <input type="text" id="inputClass" placeholder="Khóa (VD: K48.2026)..." class="w-full px-5 py-3 md:py-4 border-2 border-slate-100 rounded-2xl focus:border-blue-600 outline-none font-semibold transition-all text-sm">
                    <button onclick="startExam()" class="w-full py-4 md:py-5 bg-orange-500 hover:bg-orange-600 text-white font-black rounded-2xl shadow-xl transition-all transform active:scale-95 uppercase text-sm md:text-base">
                        BẮT ĐẦU THI <i class="fas fa-play ml-2"></i>
                    </button>
                </div>
                <p class="mt-8 text-center text-[10px] text-slate-400 font-bold uppercase tracking-widest italic">Hệ thống AI tích hợp - Gemini 3 Flash</p>
            </div>
        </div>
    </div>

    <header id="mainHeader" class="hidden caee-gradient text-white p-3 md:p-4 shadow-xl flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-2 md:space-x-3">
            <i class="fas fa-university text-xl md:text-2xl"></i>
            <div>
                <h1 class="text-[10px] md:text-sm font-black uppercase leading-none">Khoa Máy thi công - CAEE</h1>
                <p class="text-[8px] md:text-[10px] tracking-widest text-blue-200 uppercase font-bold mt-1">Hệ thống Sát hạch AI</p>
            </div>
        </div>
        <div id="timerDisplay" class="bg-slate-900/40 px-4 py-1 md:px-6 md:py-2 rounded-xl text-lg md:text-2xl font-mono font-black text-orange-400 border border-white/10 shadow-inner">20:00</div>
    </header>

    <main id="mainContent" class="hidden flex-1 flex flex-col md:flex-row">
        <section class="flex-1 p-4 md:p-8 bg-slate-50">
            <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-lg p-5 md:p-10 relative border border-slate-100">
                
                <div id="aiBox" class="hidden mb-6 bg-purple-50 border-l-4 md:border-l-8 border-purple-500 p-4 md:p-6 rounded-2xl relative shadow-sm">
                    <button onclick="closeAI()" class="absolute top-2 right-2 text-purple-300 hover:text-purple-600"><i class="fas fa-times-circle text-lg"></i></button>
                    <div class="flex items-start">
                        <div class="bg-purple-600 text-white p-2 md:p-3 rounded-xl mr-3 md:mr-4 shadow-lg"><i class="fas fa-magic text-sm"></i></div>
                        <div>
                            <h4 class="font-black text-purple-900 text-[10px] uppercase mb-1 tracking-widest">✨ Giải thích AI</h4>
                            <p id="aiContent" class="text-slate-700 text-xs md:text-sm leading-relaxed font-medium"></p>
                        </div>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-6">
                    <span id="qTag" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-tighter">Kỹ thuật lái</span>
                    <button onclick="askAI()" class="bg-purple-100 hover:bg-purple-200 text-purple-700 px-3 py-2 rounded-xl font-black text-[9px] uppercase transition-all flex items-center">
                        <i class="fas fa-sparkles mr-2"></i> GIẢI THÍCH
                    </button>
                </div>

                <div class="flex justify-between items-start mb-6 gap-4">
                    <h2 id="qText" class="text-lg md:text-2xl font-extrabold text-slate-800 leading-snug">Đang tải câu hỏi...</h2>
                    <button onclick="speakQ()" class="flex-shrink-0 w-10 h-10 bg-slate-100 text-slate-500 rounded-xl flex items-center justify-center active:bg-blue-100 active:text-blue-600 transition-colors">
                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>

                <div id="imgWrap" class="hidden mb-6 flex justify-center bg-slate-50 rounded-2xl p-4 border-2 border-dashed border-slate-200">
                    <img id="qImg" src="" class="max-h-48 md:max-h-72 rounded-lg shadow-lg" alt="Hình minh họa">
                </div>

                <div id="optList" class="grid grid-cols-1 gap-3"></div>

                <div class="mt-8 pt-6 border-t border-slate-100 flex justify-between items-center">
                    <button onclick="moveQ(-1)" class="px-4 py-3 bg-white border-2 border-slate-100 font-black rounded-xl text-slate-400 hover:text-blue-600 text-[10px] uppercase tracking-widest transition-all">Trước</button>
                    <div class="hidden md:block h-1.5 w-32 bg-slate-100 rounded-full overflow-hidden">
                        <div id="progBar" class="h-full bg-blue-600 transition-all" style="width: 0%"></div>
                    </div>
                    <button onclick="moveQ(1)" class="px-6 py-3 bg-blue-600 text-white font-black rounded-xl shadow-lg hover:bg-blue-700 text-[10px] uppercase tracking-widest transition-all">Tiếp theo</button>
                </div>
            </div>
        </section>

        <aside class="w-full md:w-80 bg-white border-t md:border-t-0 md:border-l border-slate-100 p-6 flex flex-col shadow-2xl">
            <h3 class="font-black text-slate-400 text-[10px] uppercase mb-4 tracking-widest flex items-center">
                <i class="fas fa-th-large mr-2 text-blue-600"></i> Danh sách câu hỏi (1-30)
            </h3>
            <div id="qGrid" class="grid grid-cols-6 md:grid-cols-5 gap-2 mb-6 overflow-y-auto max-h-48 md:max-h-full custom-scroll pr-2"></div>
            
            <div class="mt-auto pt-6 border-t border-slate-50 space-y-4">
                <button onclick="submitTest()" class="w-full py-4 md:py-6 bg-red-600 text-white font-black rounded-2xl shadow-xl hover:bg-red-700 transition-all active:scale-95 text-base md:text-lg uppercase">
                    NỘP BÀI THI
                </button>
            </div>
        </aside>
    </main>

    <div id="resModal" class="hidden fixed inset-0 bg-slate-900/90 z-[200] flex items-center justify-center p-4 backdrop-blur-md overflow-y-auto">
        <div class="bg-white rounded-[32px] md:rounded-[40px] max-w-2xl w-full p-8 md:p-12 text-center my-auto shadow-2xl">
            <div id="resIcon" class="text-6xl md:text-8xl mb-4 md:mb-6"></div>
            <h2 id="resTitle" class="text-2xl md:text-4xl font-black mb-2 uppercase"></h2>
            <p id="resScore" class="text-xl md:text-2xl font-extrabold text-blue-600 mb-6 md:mb-8"></p>
            
            <div class="bg-slate-900 rounded-2xl md:rounded-3xl p-6 md:p-8 mb-6 md:mb-8 text-left relative overflow-hidden shadow-xl">
                <h4 class="text-blue-400 font-black text-[10px] uppercase mb-3 flex items-center">
                    <span class="w-2 h-2 rounded-full bg-blue-500 mr-2 animate-ping"></span> ✨ AI Nhận xét
                </h4>
                <p id="aiFeedback" class="text-blue-100 text-xs md:text-sm leading-relaxed font-medium italic"></p>
            </div>

            <button onclick="location.reload()" class="w-full py-4 bg-blue-600 text-white font-black rounded-xl hover:bg-blue-700 transition-all uppercase text-sm tracking-widest">
                Làm đề thi mới
            </button>
        </div>
    </div>

    <script>
        // Cấu hình ứng dụng
        const apiKey = ""; // API Key của bạn
        
        const bank = [
            { q: "Khi lên hoặc xuống cabin xe nâng, người lái xe cần thực hiện như thế nào cho đúng?", options: { A: "Nhảy nhanh lên cabin để tiết kiệm thời gian.", B: "Bám vô lăng để leo lên.", C: "Tay trái nắm tay vịn, tay phải bám vào tựa lưng ghế, bước từng bậc lên xuống.", D: "Đặt chân lên càng nâng để leo lên." }, correct: "C", group: "Kỹ thuật lái", img: "https://drive.google.com/uc?export=download&id=1eRUzZsJtgEcj0vohejao3ga3iWJRr_UP" },
            { q: "Trước khi đưa xe nâng vào hoạt động, người lái cần làm gì?", options: { A: "Khởi động máy ngay lập tức.", B: "Kiểm tra mức dầu động cơ, dầu thủy lực, nước làm mát, phanh và lốp.", C: "Chỉ cần kiểm tra xăng/nhiên liệu.", D: "Nâng thử hàng nặng nhất để kiểm tra sức nâng." }, correct: "B", group: "Vận hành" },
            { q: "Khoảng cách an toàn tối thiểu giữa xe nâng và người đi bộ trong kho là bao nhiêu?", options: { A: "0.5 mét", B: "1 mét", C: "Ít nhất 2 mét", D: "5 mét" }, correct: "C", group: "An toàn" },
            { q: "Khi di chuyển trên dốc có hàng, tư thế xe như thế nào là an toàn?", options: { A: "Hàng quay về phía xuống dốc.", B: "Hàng quay về phía lên dốc.", C: "Đi ngang dốc.", D: "Đi lùi khi lên dốc." }, correct: "B", group: "Kỹ thuật lái" },
            { q: "Khi dừng xe nâng để đỗ, người lái cần thực hiện các thao tác nào?", options: { A: "Tắt máy và rời cabin ngay.", B: "Hạ càng sát đất, nghiêng khung về phía trước, kéo phanh tay, về số N, tắt máy.", C: "Kéo phanh tay và để càng nâng cao 50cm.", D: "Để nguyên số và tắt máy." }, correct: "B", group: "Vận hành" },
            { q: "Mục đích của việc kiểm tra xích nâng là gì?", options: { A: "Để xích luôn sáng bóng.", B: "Để phát hiện vết nứt, độ giãn và đảm bảo xích được bôi trơn.", C: "Để đếm số mắt xích.", D: "Để điều chỉnh tốc độ nâng." }, correct: "B", group: "Bảo dưỡng" },
            { q: "Nếu tải trọng hàng che khuất tầm nhìn phía trước, người lái phải làm gì?", options: { A: "Rướn người ra ngoài quan sát.", B: "Lùi xe khi di chuyển để quan sát phía trước thoáng hơn.", C: "Nhờ người ngồi lên hàng chỉ đường.", D: "Bấm còi liên tục và chạy nhanh." }, correct: "B", group: "Kỹ thuật lái" }
        ];

        let questions = [];
        let answers = new Array(30).fill(null);
        let current = 0;
        let timeLeft = 1200;
        let timer;

        async function geminiCall(prompt) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (e) { return null; }
        }

        function startExam() {
            const name = document.getElementById('inputName').value.trim();
            const cls = document.getElementById('inputClass').value.trim();
            if(!name || !cls) { alert("Học viên vui lòng điền đủ thông tin!"); return; }
            
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainHeader').classList.remove('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            
            questions = [...bank].sort(() => 0.5 - Math.random());
            while(questions.length < 30) questions.push({...bank[Math.floor(Math.random()*bank.length)]});
            
            renderGrid();
            renderQ(0);
            startTimer();
        }

        function renderGrid() {
            const grid = document.getElementById('qGrid');
            grid.innerHTML = '';
            for(let i=0; i<30; i++) {
                const btn = document.createElement('div');
                btn.className = 'q-grid-item h-10 flex items-center justify-center border-2 border-slate-100 rounded-lg cursor-pointer font-black text-xs text-slate-400';
                btn.id = `g-${i}`;
                btn.innerText = i + 1;
                btn.onclick = () => renderQ(i);
                grid.appendChild(btn);
            }
        }

        function renderQ(idx) {
            current = idx;
            const q = questions[idx];
            document.getElementById('qText').innerText = q.q;
            document.getElementById('qTag').innerText = q.group;
            document.getElementById('progBar').style.width = `${((idx+1)/30)*100}%`;
            
            const imgWrap = document.getElementById('imgWrap');
            const imgEl = document.getElementById('qImg');
            if(q.img) { imgEl.src = q.img; imgWrap.classList.remove('hidden'); }
            else { imgWrap.classList.add('hidden'); }

            const list = document.getElementById('optList');
            list.innerHTML = '';
            ['A','B','C','D'].forEach(o => {
                if(q.options[o]) {
                    const card = document.createElement('div');
                    card.className = `option-card p-4 rounded-xl cursor-pointer flex items-center ${answers[idx] === o ? 'selected' : ''}`;
                    card.innerHTML = `
                        <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center mr-3 font-black text-xs ${answers[idx] === o ? 'bg-blue-600 text-white border-blue-600' : 'text-slate-300 border-slate-100'}">${o}</div>
                        <div class="font-bold text-slate-700 text-sm">${q.options[o]}</div>
                    `;
                    card.onclick = () => { 
                        answers[idx] = o; 
                        document.getElementById(`g-${idx}`).classList.add('answered'); 
                        renderQ(idx); 
                    };
                    list.appendChild(card);
                }
            });

            document.querySelectorAll('.q-grid-item').forEach(e => e.classList.remove('active'));
            document.getElementById(`g-${idx}`).classList.add('active');
            document.getElementById('aiBox').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function askAI() {
            const box = document.getElementById('aiBox');
            const content = document.getElementById('aiContent');
            box.classList.remove('hidden');
            content.innerHTML = `<span class="pulse-ai text-purple-400 italic">Gemini AI đang suy nghĩ...</span>`;
            
            const q = questions[current];
            const prompt = `Giải thích ngắn gọn tại sao ${q.correct} là đúng cho: "${q.q}". Các phương án: A:${q.options.A}, B:${q.options.B}, C:${q.options.C}, D:${q.options.D}. Tối đa 60 chữ.`;
            const text = await geminiCall(prompt);
            content.innerText = text || "Không thể kết nối AI.";
        }

        function startTimer() {
            timer = setInterval(() => {
                timeLeft--;
                const m = Math.floor(timeLeft/60);
                const s = timeLeft%60;
                document.getElementById('timerDisplay').innerText = `${m}:${s<10?'0':''}${s}`;
                if(timeLeft <= 0) submitTest();
            }, 1000);
        }

        async function submitTest() {
            clearInterval(timer);
            let score = 0;
            questions.forEach((q, i) => { if(answers[i] === q.correct) score++; });
            const isPass = score >= 27;
            
            document.getElementById('resModal').classList.remove('hidden');
            document.getElementById('resIcon').innerText = isPass ? '🏅' : '🚧';
            document.getElementById('resTitle').innerText = isPass ? "ĐẠT" : "CHƯA ĐẠT";
            document.getElementById('resTitle').className = `text-4xl font-black mb-2 ${isPass ? 'text-green-500' : 'text-red-500'}`;
            document.getElementById('resScore').innerText = `Kết quả: ${score} / 30 câu đúng`;
            
            const feedback = document.getElementById('aiFeedback');
            feedback.innerHTML = `<span class="pulse-ai">Đang phân tích kết quả...</span>`;
            const text = await geminiCall(`Học viên đạt ${score}/30 điểm thi lái xe nâng. Hãy cho 1 câu nhận xét ngắn gọn và khích lệ.`);
            feedback.innerText = text || "Hãy tiếp tục cố gắng rèn luyện!";
        }

        function moveQ(step) {
            let next = current + step;
            if(next >= 0 && next < 30) renderQ(next);
        }

        function closeAI() { document.getElementById('aiBox').classList.add('hidden'); }
        function speakQ() {
            const msg = new SpeechSynthesisUtterance(questions[current].q);
            msg.lang = 'vi-VN';
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
